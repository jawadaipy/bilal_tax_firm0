<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilal Tax Firm (developed by Agentic Jawad)</title>
    <script>
      (function() {
        try {
          let currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get() {
              return currentFetch;
            },
            set(val) {
              currentFetch = val;
            }
          });
        } catch (e) {
          console.warn('Failed to define window.fetch setter', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
